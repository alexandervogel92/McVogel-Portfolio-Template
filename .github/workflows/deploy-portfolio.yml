# .github/workflows/deploy-portfolio.yml
name: 🚀 Deploy Portfolio

on:
  push:
    branches: [ main ]
    paths:
      - 'portfolio-alex/**'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch:

jobs:
  deploy-portfolio:
    runs-on: ubuntu-latest

    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      REMOTE_PROJECT_PATH: ${{ secrets.REMOTE_PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pull portfolio & restart service
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << EOF
            set -e
            cd "$REMOTE_PROJECT_PATH"
            git pull origin main
            cd /srv/docker/birdeye-infra
            docker compose -f docker-compose.yml -f docker-compose.basic-auth.yml up -d --no-deps --build portfolio-web
          EOF
