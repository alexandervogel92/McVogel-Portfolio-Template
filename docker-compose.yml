services:
  portfolio-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-frontend:latest
    labels:
      traefik.enable: "true"
      traefik.http.routers.portfolio.entrypoints: "web"
      traefik.http.routers.portfolio.rule: "Host(`vogel-co.de`) || Host(`www.vogel-co.de`)"
      traefik.http.services.portfolio.loadbalancer.server.port: "80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    restart: on-failure

  # optional, falls du ein eigenes Portfolio‑API hast:
#  portfolio-backend:
#    # …
#    networks:
#      - proxy

networks:
  proxy:
    external: true
